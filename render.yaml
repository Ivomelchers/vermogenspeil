# Render Blueprint — Vermogenspeil API + PostgreSQL + Valkey (Redis)
#
# Free tier: GEEN aparte background workers (Render: "service type is not available for this plan").
# Celery worker + beat draaien IN de web-container via RUN_CELERY_IN_WEB=true (zie scripts/start.sh).
#
# Bij upgrade naar Starter: voeg aparte worker-services toe (zie docs/deployment/RENDER-CELERY.md).

databases:
  - name: vermogenspeil-db
    plan: free
    databaseName: vermogenspeil
    user: vermogenspeil
    region: frankfurt

services:
  - type: keyvalue
    name: vermogenspeil-redis
    plan: free
    region: frankfurt
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: vermogenspeil-api
    runtime: docker
    plan: free
    region: frankfurt
    rootDir: backend
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vermogenspeil-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vermogenspeil-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: vermogenspeil-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: vermogenspeil-redis
          type: keyvalue
          property: connectionString
      # Free tier: Celery in web-process (geen aparte worker-service)
      - key: RUN_CELERY_IN_WEB
        value: "true"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: CELERY_CONCURRENCY
        value: "1"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_CLIENT_ID
        sync: false
      - key: AUTH0_CLIENT_SECRET
        sync: false
      - key: AUTH0_FRONTEND_CLIENT_ID
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
