# Render Blueprint — Vermogenspeil API + PostgreSQL
# Deploy: Render Dashboard → Blueprints → New Blueprint Instance → kies deze repo

databases:
  - name: vermogenspeil-db
    plan: free
    databaseName: vermogenspeil
    user: vermogenspeil
    region: frankfurt

services:
  - type: web
    name: vermogenspeil-api
    runtime: docker
    plan: free
    region: frankfurt
    rootDir: backend
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vermogenspeil-db
          property: connectionString
      # Vul in na Vercel deploy (bv. https://jouw-app.vercel.app)
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
